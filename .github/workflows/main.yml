# .github/workflows/streamlit-app.yml
name: Streamlit app
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
permissions:
  contents: write
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check with autofix
        run: ruff check --fix .
        continue-on-error: true

      - name: Run ruff format
        run: ruff format .

      - name: Commit and push if changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && git diff --staged --quiet || \
            (git add -A && git commit -m "style: auto-format with ruff" && git push)

      - name: Report remaining ruff errors as annotations
        run: ruff check --output-format github --exit-zero .

  streamlit:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - uses: streamlit/streamlit-app-action@v0.0.3
        with:
          app-path: main.py